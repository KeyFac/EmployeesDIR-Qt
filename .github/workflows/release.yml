name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.8 (MSVC)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure CMake
        working-directory: EmployeesDIR
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: EmployeesDIR
        run: cmake --build build --config Release --parallel

      - name: Deploy
        working-directory: EmployeesDIR
        shell: cmd
        run: |
          set "PATH=%QT_ROOT_DIR%\bin;%PATH%"
          mkdir ..\deploy 2>nul
          copy /Y build\Release\EmployeesDIR.exe ..\deploy\
          copy /Y config.ini ..\deploy\
          if not exist ..\deploy\i18n mkdir ..\deploy\i18n
          copy /Y EmployeesDIR_en_US.qm ..\deploy\i18n\
          copy /Y EmployeesDIR_zh_CN.qm ..\deploy\i18n\
          windeployqt --release ..\deploy\EmployeesDIR.exe

      - name: Package
        shell: cmd
        run: |
          cd deploy
          7z a -tzip ..\EmployeesDIR-%GITHUB_REF_NAME%.zip *
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: EmployeesDIR-${{ github.ref_name }}
          path: deploy/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: EmployeesDIR-${{ github.ref_name }}.zip
          name: EmployeesDIR ${{ github.ref_name }}
          draft: false
          prerelease: false
