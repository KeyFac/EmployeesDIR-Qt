name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: windows
          target: desktop
          arch: win64_mingw
          cache: true

      - name: Configure CMake
        working-directory: EmployeesDIR
        shell: cmd
        run: |
          set "MINGW_DIR=%QT_ROOT_DIR%\..\..\Tools\mingw1310_64"
          set "PATH=%MINGW_DIR%\bin;%QT_ROOT_DIR%\bin;%PATH%"
          rmdir /s /q build 2>nul
          cmake -B build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_CXX_COMPILER="%MINGW_DIR%\bin\g++.exe" ^
            -DCMAKE_C_COMPILER="%MINGW_DIR%\bin\gcc.exe" ^
            -G "MinGW Makefiles"

      - name: Build
        working-directory: EmployeesDIR
        shell: cmd
        run: |
          set "PATH=%QT_ROOT_DIR%\..\..\Tools\mingw1310_64\bin;%QT_ROOT_DIR%\bin;%PATH%"
          cmake --build build --parallel

      - name: Deploy
        working-directory: EmployeesDIR
        shell: cmd
        run: |
          set "PATH=%QT_ROOT_DIR%\..\..\Tools\mingw1310_64\bin;%QT_ROOT_DIR%\bin;%PATH%"
          mkdir ..\deploy 2>nul
          copy /Y build\EmployeesDIR.exe ..\deploy\
          copy /Y config.ini ..\deploy\
          if not exist ..\deploy\i18n mkdir ..\deploy\i18n
          copy /Y EmployeesDIR_en_US.qm ..\deploy\i18n\
          copy /Y EmployeesDIR_zh_CN.qm ..\deploy\i18n\
          windeployqt --release ..\deploy\EmployeesDIR.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: EmployeesDIR-${{ github.ref_name }}
          path: deploy/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: deploy/**
          name: EmployeesDIR ${{ github.ref_name }}
          draft: false
          prerelease: false
